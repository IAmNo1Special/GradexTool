[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.plugin
markers =
    async: mark test as async
    unit: mark test as unit test
    integration: mark test as integration test
    guardrails: tests for guardrails mod
    revomon: tests for revomon mod
    grappraisal: tests for grappraisal mod
    tiptops_shop: tests for tiptops_shop mod
    elders_library: tests for the_elders_library mod
    helpers: tests for helper functions
    gradexDB: tests for database operations
    main: tests for main entry point
    revomon_script: tests for revomon data script
    natures_script: tests for natures script
    abilities_script: tests for abilities script
    items_script: tests for items script
    moves_script: tests for moves script
    type_charts_script: tests for type charts script
    evolutions_script: tests for evolutions script
    capsules_script: tests for capsules script
    fruitys_script: tests for fruitys script
    medicines_script: tests for medicines script
    movepools_script: tests for movepools script
    base_types_script: tests for base types script
    modules_integration: integration tests for script modules
pythonpath = scripts
